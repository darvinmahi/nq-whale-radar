name: COT Weekly Update

on:
  schedule:
    # Cada viernes a las 22:30 UTC (CFTC publica ~3:30pm ET = 20:30 UTC, buffer 2h)
    - cron: '30 22 * * 5'
  workflow_dispatch:   # también se puede lanzar manualmente desde GitHub

jobs:
  update-cot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: 1. Actualizar CSV con nuevas semanas CFTC
        run: python repair_and_update_cot.py
        timeout-minutes: 5

      - name: 2. Inyectar widget COT en index.html + generar historial
        run: python fix_and_inject_cot.py
        timeout-minutes: 8

      - name: 3. Parchear motor JS (FALLBACK real + API mapping correcto)
        run: python patch_cot_engine.py
        timeout-minutes: 3

      - name: 4. Commit y Push
        run: |
          git config user.name  "COT-Bot"
          git config user.email "cot-bot@nq-whale-radar"
          git add data/cot/nasdaq_cot_historical.csv index.html cot_historial.html
          git diff --cached --quiet && echo "No hay cambios esta semana" && exit 0
          WEEK=$(date -u +"%Y-%m-%d")
          git commit -m "cot: auto-update ${WEEK} — CFTC data + widget + JS engine + historial"
          git push
