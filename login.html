<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · AI Fundamental Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #020617;
            --purple: #a855f7;
            --purple-dark: #7c3aed;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --cyan: #00f2ff;
            --cyan-glow: rgba(0, 242, 255, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(168, 85, 247, 0.2);
            --error-red: #ef4444;
        }

        body {
            background: var(--navy);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ═══ Animated Grid Background ═══ */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(to right, rgba(168, 85, 247, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(168, 85, 247, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* ═══ Ambient Glow Orbs ═══ */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15), transparent 70%);
            top: -200px; left: -200px;
            animation: float-orb 12s ease-in-out infinite;
        }
        .glow-orb-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.08), transparent 70%);
            bottom: -200px; right: -200px;
            animation: float-orb 15s ease-in-out infinite reverse;
        }
        .glow-orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.12), transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-orb 4s ease-in-out infinite;
        }

        @keyframes float-orb {
            0%, 100% { transform: translateY(0) translateX(0); }
            33% { transform: translateY(-30px) translateX(20px); }
            66% { transform: translateY(20px) translateX(-15px); }
        }
        @keyframes pulse-orb {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        /* ═══ Floating Particles ═══ */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--purple);
            border-radius: 50%;
            opacity: 0;
            animation: particle-float linear infinite;
        }

        @keyframes particle-float {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        /* ═══ Login Container ═══ */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ═══ Glass Card ═══ */
        .login-card {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px 40px 40px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 60px rgba(168, 85, 247, 0.08),
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Top accent line */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple), var(--cyan), var(--purple), transparent);
            border-radius: 2px;
        }

        /* Subtle scan line */
        .login-card::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0; right: 0;
            height: 200%;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(168, 85, 247, 0.02) 50%,
                transparent 100%
            );
            animation: scan 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(-33%); }
            100% { transform: translateY(33%); }
        }

        /* ═══ Logo & Brand ═══ */
        .brand-section {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 64px; height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--purple-dark), var(--purple));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px var(--purple-glow);
            position: relative;
        }
        .logo-icon .material-symbols-outlined {
            font-size: 32px;
            color: white;
            font-variation-settings: 'FILL' 1;
        }
        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            z-index: -1;
            opacity: 0.5;
            animation: pulse-orb 3s ease-in-out infinite;
        }

        .brand-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: rgba(148, 163, 184, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ═══ Form ═══ */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(148, 163, 184, 0.6);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .material-symbols-outlined {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: rgba(148, 163, 184, 0.4);
            transition: color 0.3s;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 12px;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(148, 163, 184, 0.3);
        }

        .form-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1), 0 0 20px rgba(168, 85, 247, 0.05);
            background: rgba(168, 85, 247, 0.03);
        }

        .form-input:focus + .material-symbols-outlined,
        .form-input:focus ~ .material-symbols-outlined {
            color: var(--purple);
        }

        /* Toggle password visibility */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(148, 163, 184, 0.4);
            cursor: pointer;
            padding: 4px;
            font-size: 20px;
            transition: color 0.3s;
        }
        .toggle-password:hover { color: var(--purple); }

        /* ═══ Submit Button ═══ */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--purple-dark), var(--purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--purple-glow);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Button shimmer */
        .btn-login::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }
        .btn-login:hover::after { left: 100%; }

        /* Loading state */
        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }
        .btn-login.loading .btn-text { visibility: hidden; }
        .btn-login.loading::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 22px; height: 22px;
            margin: -11px 0 0 -11px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ═══ Error Message ═══ */
        .error-msg {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 13px;
            margin-top: 16px;
            animation: shake 0.4s ease-out;
        }
        .error-msg.visible { display: flex; }
        .error-msg .material-symbols-outlined { font-size: 18px; color: var(--error-red); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* ═══ Footer ═══ */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: rgba(148, 163, 184, 0.3);
            letter-spacing: 2px;
        }
        .login-footer .version {
            color: var(--purple);
            opacity: 0.6;
        }

        /* ═══ Success Animation ═══ */
        .success-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--navy);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        .success-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .success-icon {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple-dark), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px var(--purple-glow);
            animation: pulse-success 1s ease-in-out infinite;
        }
        .success-icon .material-symbols-outlined {
            font-size: 40px;
            color: white;
            font-variation-settings: 'FILL' 1;
        }
        @keyframes pulse-success {
            0%, 100% { box-shadow: 0 0 30px var(--purple-glow); }
            50% { box-shadow: 0 0 60px var(--purple-glow), 0 0 100px rgba(168,85,247,0.2); }
        }
        .success-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--purple);
        }
        .success-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: rgba(148, 163, 184, 0.5);
        }

        /* ═══ System Status Bar ═══ */
        .status-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 32px;
            background: rgba(2, 6, 23, 0.9);
            border-bottom: 1px solid rgba(168, 85, 247, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 50;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: rgba(148, 163, 184, 0.5);
            letter-spacing: 1px;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--purple);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--purple-glow); }
            50% { opacity: 0.4; box-shadow: none; }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="grid-bg"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span class="status-dot"></span>
        <span>SISTEMA ACTIVO · AUTENTICACIÓN REQUERIDA</span>
    </div>

    <!-- Login Form -->
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-section">
                <div class="logo-icon">
                    <span class="material-symbols-outlined">radar</span>
                </div>
                <div class="brand-title">AI Fundamental</div>
                <div class="brand-subtitle">Intelligence Terminal</div>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-wrapper">
                        <input
                            class="form-input"
                            type="email"
                            id="email"
                            name="email"
                            placeholder="tu@email.com"
                            required
                            autocomplete="email"
                        >
                        <span class="material-symbols-outlined">mail</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <input
                            class="form-input"
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                        >
                        <span class="material-symbols-outlined">lock</span>
                        <button type="button" class="toggle-password material-symbols-outlined" onclick="togglePassword()">
                            visibility_off
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-text">ACCEDER AL TERMINAL</span>
                </button>

                <div class="error-msg" id="errorMsg">
                    <span class="material-symbols-outlined">error</span>
                    <span id="errorText">Credenciales incorrectas. Verifica tu email y contraseña.</span>
                </div>
            </form>

            <div class="login-footer">
                AI FUNDAMENTAL · NQ WHALE RADAR <span class="version">v4.2</span>
            </div>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-icon">
            <span class="material-symbols-outlined">verified</span>
        </div>
        <div class="success-text">Acceso Autorizado</div>
        <div class="success-sub" id="welcomeUser">Bienvenido, Operador</div>
    </div>

    <script>
    (function() {
        'use strict';

        // ═══ Authorized Users (email → { hash, displayName }) ═══
        // Passwords are SHA-256 hashed — never stored in plaintext
        const USERS = {
            'darvinmahia@gmail.com': {
                hash: 'ef797c8118f02dfb649607dd5d3f8c7623048c9c063d532cc95c5ed7a898a64f',
                name: 'Darvin Mahia'
            }
        };

        const SESSION_KEY = 'nq_whale_session';

        // Check if already logged in
        try {
            const existing = JSON.parse(localStorage.getItem(SESSION_KEY));
            if (existing && (Date.now() - existing.timestamp < 24 * 60 * 60 * 1000)) {
                // Already authenticated — redirect
                const redirect = sessionStorage.getItem('nq_redirect') || 'index.html';
                sessionStorage.removeItem('nq_redirect');
                window.location.replace(redirect);
                return;
            }
        } catch(e) {}

        // SHA-256 hash function (Web Crypto API)
        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Toggle password visibility
        window.togglePassword = function() {
            const pwd = document.getElementById('password');
            const btn = document.querySelector('.toggle-password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.textContent = 'visibility';
            } else {
                pwd.type = 'password';
                btn.textContent = 'visibility_off';
            }
        };

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const errorEl = document.getElementById('errorMsg');

            // Hide previous error
            errorEl.classList.remove('visible');

            // Loading state
            btn.classList.add('loading');

            // Simulate network delay for realism
            await new Promise(r => setTimeout(r, 800));

            // Check credentials
            const user = USERS[email];
            if (!user) {
                btn.classList.remove('loading');
                errorEl.classList.add('visible');
                document.getElementById('errorText').textContent = 'Email no registrado en el sistema.';
                return;
            }

            const passwordHash = await sha256(password);
            if (passwordHash !== user.hash) {
                btn.classList.remove('loading');
                errorEl.classList.add('visible');
                document.getElementById('errorText').textContent = 'Contraseña incorrecta. Intenta de nuevo.';
                return;
            }

            // ✅ Success!
            const session = {
                user: user.name,
                email: email,
                timestamp: Date.now()
            };
            localStorage.setItem(SESSION_KEY, JSON.stringify(session));

            btn.classList.remove('loading');

            // Show success animation
            const overlay = document.getElementById('successOverlay');
            document.getElementById('welcomeUser').textContent = `Bienvenido, ${user.name}`;
            overlay.classList.add('active');

            // Redirect after animation
            setTimeout(() => {
                const redirect = sessionStorage.getItem('nq_redirect') || 'index.html';
                sessionStorage.removeItem('nq_redirect');
                window.location.replace(redirect);
            }, 1800);
        });

        // ═══ Particle System ═══
        const particleContainer = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (6 + Math.random() * 10) + 's';
            p.style.animationDelay = (Math.random() * 8) + 's';
            p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
            p.style.background = Math.random() > 0.5 ? 'var(--purple)' : 'var(--cyan)';
            particleContainer.appendChild(p);
        }

        // Focus email on load
        setTimeout(() => document.getElementById('email').focus(), 500);
    })();
    </script>
</body>
</html>
